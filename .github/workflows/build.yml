name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ===== Backend =====
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd siteguard-backend
          docker build -t siteguard-api:${{ github.ref_name }} .
          docker tag siteguard-api:${{ github.ref_name }} \
            ${{ secrets.DOCKER_REGISTRY }}/siteguard-api:${{ github.ref_name }}

      - name: Push to registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin \
            ${{ secrets.DOCKER_REGISTRY }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/siteguard-api:${{ github.ref_name }}

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/siteguard
            docker compose pull
            docker compose up -d
            docker system prune -f

  # ===== Windows EXE =====
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd siteguard-desktop
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          cd siteguard-desktop
          python build/build_exe.py

      - name: Build installer (NSIS)
        uses: joncloud/makensis-action@v4
        with:
          script-file: siteguard-desktop/build/installer.nsi

      - name: Code Signing
        if: env.CERT_PASSWORD != ''
        env:
          CERT_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          signtool sign /f certificate.pfx /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 `
            siteguard-desktop/dist/SiteGuardMonitor_Setup_*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: siteguard-desktop/dist/SiteGuardMonitor_Setup_*.exe

      - name: Upload to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: 'siteguard-desktop/dist'
          DEST_DIR: 'releases/windows/${{ github.ref_name }}'

  # ===== Android =====
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | \
            base64 -d > siteguard-android/app/keystore.jks

      - name: Build Release APK
        run: |
          cd siteguard-android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build Release Bundle (AAB)
        run: |
          cd siteguard-android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: siteguard-android/app/build/outputs/apk/release/*.apk

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.siteguard.monitor
          releaseFiles: siteguard-android/app/build/outputs/bundle/release/*.aab
          track: production
          status: completed

      - name: Upload to RuStore
        run: |
          curl -X POST "https://public-api.rustore.ru/public/v1/application/com.siteguard.monitor/version" \
            -H "Authorization: Bearer ${{ secrets.RUSTORE_TOKEN }}" \
            -F "file=@siteguard-android/app/build/outputs/apk/release/app-release.apk"

  # ===== Create Release =====
  create-release:
    needs: [build-backend, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./releases/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./releases/android

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Что нового в ${{ github.ref_name }}" > changelog.md
          echo "" >> changelog.md
          git log --oneline --no-merges $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "HEAD~10")..HEAD >> changelog.md
          echo "" >> changelog.md
          echo "### Скачать" >> changelog.md
          echo "- Windows: SiteGuardMonitor_Setup.exe" >> changelog.md
          echo "- Android: app-release.apk" >> changelog.md
          echo "- Google Play: https://play.google.com/store/apps/details?id=com.siteguard.monitor" >> changelog.md
          echo "- RuStore: https://apps.rustore.ru/app/com.siteguard.monitor" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "SiteGuard Monitor ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            ./releases/windows/*.exe
            ./releases/android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify team
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_DEPLOY_CHAT }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>SiteGuard Monitor ${{ github.ref_name }}</b> released!%0A%0ABackend deployed%0AWindows EXE built%0AAndroid APK built%0AGoogle Play uploaded%0ARuStore uploaded"
