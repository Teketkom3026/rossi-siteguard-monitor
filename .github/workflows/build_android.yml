name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      working-directory: siteguard-android
      run: chmod +x gradlew || echo "No gradlew in root, creating..."

    - name: Create gradlew if missing
      working-directory: siteguard-android
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version=8.6
        fi
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: siteguard-android
      run: ./gradlew assembleDebug --no-daemon 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RossiSiteGuardMonitor-Android-APK
        path: siteguard-android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Release APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: siteguard-android/app/build/outputs/apk/debug/app-debug.apk
        name: "Rossi SiteGuard Monitor ${{ github.ref_name }}"
        append_body: true
        body: |
          - **Android APK**: app-debug.apk (Debug build)
