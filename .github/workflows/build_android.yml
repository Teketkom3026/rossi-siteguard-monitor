name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.6'

    - name: Create gradlew wrapper
      working-directory: siteguard-android
      run: |
        gradle wrapper --gradle-version=8.6 --distribution-type=bin
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: siteguard-android
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: RossiSiteGuardMonitor-Android-APK
        path: siteguard-android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Create Release with APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: siteguard-android/app/build/outputs/apk/debug/app-debug.apk
        name: "Rossi SiteGuard Monitor ${{ github.ref_name }}"
        append_body: true
        body: |
          - **Android APK**: app-debug.apk (для установки включите "Неизвестные источники")

