# /etc/nginx/sites-available/siteguard
# Rossi SiteGuard Monitor — Nginx configuration

server {
    listen 80;
    server_name 87.228.29.55 _;

    # Landing page / sales site
    location / {
        root /var/www/landing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static downloads (EXE, APK)
    location ~* \.(exe|apk|zip|pdf)$ {
        root /var/www/landing;
    }

    # Admin panel (license management dashboard)
    location /admin {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # License API — IMPORTANT: must come BEFORE /api
    # Routes to admin_server (port 8001) which has the license database
    location /api/v1/license {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API routes → FastAPI backend (port 8000)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Monitoring dashboard
    location /dashboard {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket for dashboard real-time updates
    location /ws {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
