version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: siteguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siteguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteguard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-siteguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siteguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteguard-net

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: siteguard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteguard-net

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siteguard-api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-siteguard}:${POSTGRES_PASSWORD:-siteguard_pass}@postgres:5432/${POSTGRES_DB:-siteguard}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    networks:
      - siteguard-net

  # Monitoring Orchestrator (background checker)
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siteguard-monitor
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-siteguard}:${POSTGRES_PASSWORD:-siteguard_pass}@postgres:5432/${POSTGRES_DB:-siteguard}
      REDIS_URL: redis://redis:6379/0
    command: ["python", "main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    networks:
      - siteguard-net

  # Dashboard (Flask)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siteguard-dashboard
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-siteguard}:${POSTGRES_PASSWORD:-siteguard_pass}@postgres:5432/${POSTGRES_DB:-siteguard}
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "flask", "--app", "dashboard.app", "run", "--host", "0.0.0.0", "--port", "5001"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siteguard-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: siteguard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../landing:/var/www/landing:ro
    depends_on:
      - api
      - dashboard
    networks:
      - siteguard-net

volumes:
  postgres_data:
  redis_data:

networks:
  siteguard-net:
    driver: bridge
