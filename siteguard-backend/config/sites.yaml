sites:
  - domain: rossimarket.ru
    name: "Росси Маркет"
    check_interval: 300          # секунды
    priority: high
    checks:
      availability: true
      ssl: true
      ui_tests: true
      security_scan: true
      malware_scan: true
    critical_pages:
      - url: "/"
        name: "Главная"
      - url: "/catalog"
        name: "Каталог"
      - url: "/cart"
        name: "Корзина"
      - url: "/contacts"
        name: "Контакты"
    ui_elements:
      - selector: "button.buy-btn"
        name: "Кнопка Купить"
        action: "click"
      - selector: "a[href='tel:']"
        name: "Кнопка Позвонить"
        action: "exists"
      - selector: "form.callback-form"
        name: "Форма обратной связи"
        action: "submit_test"
      - selector: "form.order-form"
        name: "Форма заявки"
        action: "submit_test"
      - selector: ".product-card"
        name: "Карточка товара"
        action: "click"

