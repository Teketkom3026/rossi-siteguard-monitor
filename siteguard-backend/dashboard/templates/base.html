<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SiteGuard Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2745;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b0;
            --green: #00e676;
            --green-bg: rgba(0, 230, 118, 0.1);
            --green-border: rgba(0, 230, 118, 0.3);
            --red: #ff1744;
            --red-bg: rgba(255, 23, 68, 0.1);
            --red-border: rgba(255, 23, 68, 0.3);
            --orange: #ff9100;
            --orange-bg: rgba(255, 145, 0, 0.1);
            --orange-border: rgba(255, 145, 0, 0.3);
            --yellow: #ffea00;
            --yellow-bg: rgba(255, 234, 0, 0.1);
            --blue: #2979ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .navbar-dark-custom {
            background: linear-gradient(135deg, #0a0a1a 0%, #16213e 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .navbar-dark-custom .navbar-brand {
            color: var(--text-primary);
            font-weight: 600;
        }

        .navbar-dark-custom .nav-link {
            color: var(--text-secondary);
        }

        .navbar-dark-custom .nav-link:hover {
            color: var(--text-primary);
        }

        .btn-logout {
            background: rgba(255, 23, 68, 0.2);
            border: 1px solid rgba(255, 23, 68, 0.3);
            color: var(--red);
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 23, 68, 0.3);
            color: #fff;
        }

        {% block extra_styles %}{% endblock %}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark-custom px-4 py-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-satellite-dish me-2"></i>SiteGuard Monitor
            </a>
            <div class="d-flex align-items-center gap-3">
                {% block nav_extra %}{% endblock %}
                {% if session.get('authenticated') %}
                <span class="text-muted me-2">
                    <i class="fas fa-user me-1"></i>{{ session.get('username', 'admin') }}
                </span>
                <a href="/logout" class="btn-logout text-decoration-none">
                    <i class="fas fa-sign-out-alt me-1"></i>Выход
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
